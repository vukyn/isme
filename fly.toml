# fly.toml — isme (auth/SSO). Deploy: `fly deploy` (builds from Dockerfile).
#
# One-time setup:
#   fly launch --no-deploy            # or `fly apps create vukyn-isme`
#   fly postgres create --name vukyn-isme-db --region sin
#   fly postgres attach vukyn-isme-db # sets DATABASE_URL secret on the app
#
# Required SECRETS (never put in this file — `fly secrets set KEY=...`):
#   DB_DSN                          # postgres conn string (from `fly pg attach`,
#                                   #   sslmode=disable over the internal 6pn net)
#   AUTH_ACCESS_TOKEN_PRIVATE_KEY   # RS256 PEM (multiline — use `fly secrets set ... < file` or import)
#   AUTH_ACCESS_TOKEN_PUBLIC_KEY    # RS256 PEM
#   AUTH_REFRESH_TOKEN_SECRET_KEY   # HS256 secret (refresh token sign/validate)
#   AES_SECRET                      # cryp key
#   MEDIOA_API_KEY                  # mk_... (optional; avatar upload disabled while empty)
#
# See https://fly.io/docs/reference/configuration/

app = 'vukyn-isme'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_NAME = 'isme'
  APP_ENV = 'production'
  APP_PORT = '8081'
  LOGGER_MODE = 'json'
  LOGGER_LEVEL = 'info'
  DB_DRIVER = 'postgres'
  DB_SSLMODE = 'require'
  MEDIOA_BASE_URL = 'https://medioa.fly.dev'
  # UI API base — injected into the SPA's window.__APP_CONFIG__ at runtime.
  # This app's public origin (UI + API are same-origin via the embedded server).
  VITE_API_BASE_URL = 'https://vukyn-isme.fly.dev'
  # Auth — non-secret config only (token signing keys/secrets are fly secrets)
  AUTH_APP_CODE = 'isme'
  AUTH_ENDPOINT_WEB_SSO_LOGIN = '/sso/login'
  AUTH_ENDPOINT_WEB_ACCEPT_INVITE = '/accept-invite'
  AUTH_ACCESS_TOKEN_EXPIRE_IN = '900'
  AUTH_REFRESH_TOKEN_EXPIRE_IN = '86400'
  AUTH_EXTERNAL_LOGIN_SESSION_TTL = '600'
  AUTH_EXTERNAL_EXCHANGE_CODE_TTL = '60'
  # Graceful shutdown
  GRACEFUL_VERBOSE = 'true'
  GRACEFUL_STEP_DELAY = '100'
  GRACEFUL_SERVER_SHUTDOWN_TIMEOUT = '20000'
  GRACEFUL_SCHEDULER_SHUTDOWN_TIMEOUT = '10000'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
