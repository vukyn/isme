<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="isme">
  <!-- isme favicon — aurora theme.
       Concept: monogram "i" whose dot + rounded stem doubles as an abstract
       person silhouette (identity / "is me"). Background echoes the aurora
       brand-mark gradient: cyan -> violet -> magenta at 135deg. -->
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.6" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#aurora)"/>
  <!-- the "i" / person mark -->
  <circle cx="16" cy="10" r="3.6" fill="#FFFFFF"/>
  <rect x="12.4" y="16.4" width="7.2" height="9.6" rx="3.6" fill="#FFFFFF"/>
</svg>
