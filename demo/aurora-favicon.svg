<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="isme">
  <!-- isme favicon — aurora theme.
       Mark: the app BrandMark glyph (layered "layers" mark, matches
       components/ui/brand-mark.tsx) in white, on the aurora brand gradient
       (cyan -> violet -> magenta at 135deg). -->
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.6" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#aurora)"/>
  <!-- BrandMark "layers" glyph, centered (24-grid translated to fit 32) -->
  <g transform="translate(4 4)" fill="none" stroke="#FFFFFF" stroke-width="2.2"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2 4 7l8 5 8-5-8-5Z"/>
    <path d="m4 17 8 5 8-5"/>
    <path d="m4 12 8 5 8-5"/>
  </g>
</svg>
