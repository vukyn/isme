<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>isme — SSO Login · Aurora UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ====== Aurora design tokens — copied verbatim from demo/aurora-auth-mockup.html ====== */
  :root {
    --bg-0: #07071A;
    --bg-1: #0B0B23;
    --bg-2: #12122E;
    --fg: #F4F5FF;
    --fg-soft: #C7CAE8;
    --fg-mute: #8A8FB5;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);

    --c-cyan: #22D3EE;
    --c-blue: #6366F1;
    --c-violet: #8B5CF6;
    --c-magenta: #EC4899;
    --c-amber: #F59E0B;
    --c-mint: #34D399;
    --c-red: #F87171;

    --accent: var(--c-violet);
    --accent-glow: rgba(139,92,246,0.45);

    --radius: 16px;
    --radius-sm: 12px;
    --easing: cubic-bezier(.2,.8,.2,1);
    --shadow-glass: 0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 32px rgba(0,0,0,0.45);
    --shadow-pop: 0 20px 60px rgba(99,102,241,0.25), 0 4px 12px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter','DM Sans',system-ui,-apple-system,sans-serif;
    color: var(--fg);
    background: var(--bg-0);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
    min-height: 100dvh;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }

  /* Aurora background — global (same block as the rest of the aurora set) */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(60% 50% at 12% 10%, rgba(99,102,241,0.45), transparent 60%),
      radial-gradient(45% 40% at 88% 18%, rgba(34,211,238,0.35), transparent 60%),
      radial-gradient(55% 45% at 75% 92%, rgba(236,72,153,0.32), transparent 60%),
      radial-gradient(50% 40% at 18% 80%, rgba(139,92,246,0.32), transparent 60%),
      linear-gradient(180deg, #07071A 0%, #0B0B23 60%, #04040E 100%);
    background-size: 200% 200%;
    animation: auroraFlow 14s ease-in-out infinite alternate;
    filter: saturate(1.15);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
    opacity: 0.45;
  }
  @keyframes auroraFlow {
    0%   { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0 0; }
    50%  { background-position: 30% 20%, 60% 30%, 70% 70%, 30% 60%, 0 0; }
    100% { background-position: 100% 100%, 0% 100%, 0% 0%, 100% 0%, 0 0; }
  }
  @keyframes textShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

  /* ====== Centered single-card scaffold (the SSO screen is logged-out, focused) ====== */
  .sso-wrap { min-height: 100dvh; display: grid; place-items: center; padding: 40px 20px 72px; }
  .sso-stack { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 18px; }

  /* top brand row — isme is the IDENTITY PROVIDER doing the auth */
  .brand-row { display: flex; align-items: center; justify-content: center; gap: 11px; }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 11px;
    background: linear-gradient(135deg, var(--c-cyan) 0%, var(--c-violet) 60%, var(--c-magenta) 100%);
    display: grid; place-items: center;
    box-shadow: 0 8px 24px rgba(99,102,241,0.45);
  }
  .brand-name { font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }

  /* ====== The glass auth card ====== */
  .card {
    position: relative;
    border-radius: 20px;
    padding: 30px 30px 26px;
    border: 1px solid var(--border-strong);
    background: linear-gradient(180deg, rgba(18,18,46,0.78), rgba(11,11,35,0.82));
    box-shadow: var(--shadow-pop);
    backdrop-filter: blur(20px) saturate(1.15);
    overflow: hidden;
  }
  .card .orb { position: absolute; border-radius: 50%; filter: blur(46px); pointer-events: none; }
  .card .orb-1 { width: 220px; height: 220px; right: -70px; top: -90px; background: radial-gradient(circle, rgba(99,102,241,0.50), transparent 70%); }
  .card .orb-2 { width: 200px; height: 200px; left: -70px; bottom: -90px; background: radial-gradient(circle, rgba(236,72,153,0.42), transparent 70%); }
  .card > * { position: relative; z-index: 1; }

  /* ====== SSO CONTEXT HEADER — "Sign in to continue to <app>" ====== */
  .sso-context { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; margin-bottom: 22px; }
  /* the two-app handshake: requesting app <-> isme */
  .handshake { display: flex; align-items: center; gap: 14px; }
  .app-tile {
    width: 52px; height: 52px; border-radius: 15px; display: grid; place-items: center; flex: 0 0 auto;
    position: relative;
  }
  .app-tile.medioa { background: rgba(139,92,246,0.18); border: 1px solid rgba(139,92,246,0.45); color: var(--c-violet); box-shadow: 0 0 22px rgba(139,92,246,0.25); }
  .app-tile.isme { background: conic-gradient(from 180deg, var(--c-cyan), var(--c-blue), var(--c-violet), var(--c-magenta), var(--c-cyan)); }
  .app-tile.isme > span { width: 40px; height: 40px; border-radius: 11px; background: var(--bg-0); display: grid; place-items: center; }
  .handshake .conn { display: flex; align-items: center; color: var(--fg-mute); }
  .handshake .conn svg { opacity: 0.8; }

  .sso-context h1 {
    margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.25;
  }
  .sso-context h1 .app { color: var(--fg); }
  .sso-context .sub { margin: 0; font-size: 14px; color: var(--fg-mute); max-width: 340px; }
  .sso-context .sub b { color: var(--fg-soft); font-weight: 600; }
  /* "Secured by isme SSO" pill */
  .secured-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; font-weight: 500; color: var(--fg-soft);
    padding: 5px 12px; border-radius: 999px;
    background: var(--glass); border: 1px solid var(--border-strong);
    backdrop-filter: blur(12px);
  }
  .secured-pill svg { color: var(--c-mint); }

  /* ====== Fields (verbatim anatomy from aurora-auth-mockup.html) ====== */
  .field { display: block; margin-bottom: 15px; }
  .field-label { display: block; font-size: 13px; font-weight: 500; color: var(--fg-soft); margin-bottom: 8px; }
  .input-wrap {
    display: flex; align-items: center; gap: 10px;
    background: var(--glass); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 0 14px; height: 48px;
    transition: border-color .2s var(--easing), box-shadow .2s var(--easing), background .2s var(--easing);
    backdrop-filter: blur(12px);
  }
  .input-wrap:hover { border-color: rgba(255,255,255,0.28); }
  .input-wrap:focus-within { border-color: var(--c-violet); box-shadow: 0 0 0 4px rgba(139,92,246,0.18), 0 0 24px rgba(139,92,246,0.25); background: rgba(255,255,255,0.08); }
  .input-wrap svg { color: var(--fg-mute); flex: 0 0 auto; }
  .input-wrap:focus-within svg.lead { color: var(--c-cyan); }
  .input-wrap input { flex: 1; border: 0; outline: 0; background: transparent; font: inherit; font-size: 15px; color: var(--fg); height: 100%; }
  .input-wrap input::placeholder { color: var(--fg-mute); }
  /* error state on the wrap (decision: red border + glow, message below) */
  .input-wrap.error { border-color: var(--c-red); box-shadow: 0 0 0 4px rgba(248,113,113,0.16); }
  .input-wrap.error svg.lead { color: var(--c-red); }
  .toggle-eye { background: transparent; border: 0; color: var(--fg-mute); cursor: pointer; padding: 6px; border-radius: 8px; display: grid; place-items: center; }
  .toggle-eye:hover { color: var(--fg); background: rgba(255,255,255,0.06); }
  .err-text { font-size: 12px; color: var(--c-red); margin-top: 7px; display: flex; align-items: center; gap: 6px; }
  .helper { font-size: 12px; color: var(--fg-mute); margin-top: 7px; }

  .row { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 20px; }
  .check { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; cursor: pointer; user-select: none; color: var(--fg-soft); }
  .check input {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border-strong); background: var(--glass);
    display: grid; place-items: center; cursor: pointer; transition: all .15s var(--easing);
  }
  .check input:checked { background: linear-gradient(135deg, var(--c-blue), var(--c-violet)); border-color: var(--c-violet); box-shadow: 0 0 12px var(--accent-glow); }
  .check input:checked::after { content: ""; width: 10px; height: 10px; background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='3,8.5 7,12 13,4'/></svg>") center/contain no-repeat; }
  .link { color: var(--fg-soft); font-size: 13px; text-decoration: none; font-weight: 500; border-bottom: 1px solid transparent; }
  .link:hover { color: var(--c-cyan); border-color: var(--c-cyan); }

  /* form-level error banner (e.g. invalid credentials) */
  .form-error {
    display: none; align-items: center; gap: 10px;
    padding: 11px 14px; margin-bottom: 16px;
    border-radius: var(--radius-sm);
    background: rgba(248,113,113,0.10); border: 1px solid rgba(248,113,113,0.34);
    color: var(--c-red); font-size: 13px;
  }
  .form-error.show { display: flex; }
  .form-error svg { flex: 0 0 auto; }

  /* ====== Buttons (verbatim from aurora-auth-mockup.html) ====== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; height: 50px; min-height: 44px;
    border-radius: var(--radius-sm); border: 1px solid transparent;
    font: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: transform .15s var(--easing), box-shadow .2s var(--easing), background .2s var(--easing);
    position: relative; overflow: hidden;
  }
  .btn:active { transform: translateY(1px) scale(0.995); }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--c-blue) 0%, var(--c-violet) 50%, var(--c-magenta) 100%);
    color: #fff;
    box-shadow: 0 10px 30px rgba(99,102,241,0.45), 0 0 0 1px rgba(255,255,255,0.10) inset;
    background-size: 200% 200%; background-repeat: no-repeat; background-position: 0% 0%;
  }
  .btn-primary:hover:not(:disabled) { background-position: 100% 100%; box-shadow: 0 14px 40px rgba(139,92,246,0.55); }
  .btn-primary:focus-visible { outline: 0; box-shadow: 0 0 0 4px rgba(139,92,246,0.35), 0 14px 40px rgba(139,92,246,0.55); }

  /* spinner for the loading variant */
  .spinner { width: 18px; height: 18px; border: 2.4px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* footer trust line under the card */
  .sso-foot { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--fg-mute); }
  .sso-foot svg { color: var(--fg-mute); }
  .sso-foot a { color: var(--fg-soft); text-decoration: none; }
  .sso-foot a:hover { color: var(--c-cyan); }

  /* demo state switcher — strip on port */
  .demo-switch { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 6px; padding: 6px; border-radius: 999px; background: rgba(7,7,26,0.85); border: 1px solid var(--border-strong); backdrop-filter: blur(20px); box-shadow: var(--shadow-pop); }
  .demo-switch span { font-size: 11px; color: var(--fg-mute); align-self: center; padding: 0 8px; letter-spacing: 0.08em; text-transform: uppercase; }
  .demo-switch button { font: inherit; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 999px; border: 1px solid transparent; background: transparent; color: var(--fg-soft); cursor: pointer; }
  .demo-switch button.active { background: var(--glass-strong); border-color: var(--border-strong); color: var(--fg); }
</style>
</head>
<body>

<!--
  ===========================================================================
  SSO LOGIN — public /sso/login?session_id=<id>  · AURORA theme
  ===========================================================================
  Replaces the bare centered card in ui/src/pages/SSOLogin.tsx.

  CONTEXT: a requesting app (medioa2, rainy, …) redirected the user here to
  authenticate. isme is the IDENTITY PROVIDER. The handshake header makes that
  explicit: <requesting-app logo>  ⇄  <isme logo>, with copy
  "Sign in to continue to medioa2". App name/logo are placeholders — on port
  they come from the app_service resolved via session_id.

  FLOW (matches SSOLogin.tsx): on submit → POST login { email, password,
  session_id } → isme mints authorization_code + redirect_url → postMessage
  back to opener tab (or same-tab redirect fallback) → window.close().

  STATES (demo switcher at bottom — REMOVE on port; the real page renders one):
    • default  → idle form, prefilled placeholder
    • error    → form-level banner ("invalid credentials") + per-field red state
    • loading  → CTA shows spinner + "Signing in…", inputs disabled
-->

<div class="sso-wrap">
  <div class="sso-stack">

    <!-- isme brand (the IdP) -->
    <div class="brand-row">
      <div class="brand-mark"><svg width="100%" height="100%" viewBox="0 0 32 32" fill="none" role="img" aria-label="isme"><circle cx="16" cy="10" r="3.6" fill="#FFFFFF"/><rect x="12.4" y="16.4" width="7.2" height="9.6" rx="3.6" fill="#FFFFFF"/></svg></div>
      <div class="brand-name">isme</div>
    </div>

    <div class="card">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>

      <!-- ===== SSO context header: which app you're signing in to ===== -->
      <div class="sso-context">
        <div class="handshake" aria-hidden="true">
          <!-- requesting app (placeholder logo + name = medioa2) -->
          <div class="app-tile medioa" title="medioa2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
          </div>
          <div class="conn">
            <svg width="26" height="16" viewBox="0 0 26 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h22"/><path d="m7 3-5 5 5 5"/><path d="m19 3 5 5-5 5"/></svg>
          </div>
          <!-- isme (IdP) -->
          <div class="app-tile isme" title="isme"><span><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 7l8 5 8-5-8-5Z"/><path d="m4 17 8 5 8-5"/><path d="m4 12 8 5 8-5"/></svg></span></div>
        </div>
        <h1>Sign in to continue to <span class="app">medioa2</span></h1>
        <p class="sub"><b>medioa2</b> uses isme single sign-on. Log in with your isme account to authorize access.</p>
      </div>

      <form onsubmit="event.preventDefault();">

        <!-- form-level error banner (shown in the error state) -->
        <div id="formErr" class="form-error" role="alert" aria-live="polite">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
          <span>Incorrect email or password. Please try again.</span>
        </div>

        <label class="field" for="email">
          <span class="field-label">Email</span>
          <span class="input-wrap" id="emailWrap">
            <svg class="lead" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            <input id="email" type="email" autocomplete="email" inputmode="email" placeholder="you@company.com" value="thao.nguyen@hasaki.vn" />
          </span>
        </label>

        <label class="field" for="pw">
          <span class="field-label">Password</span>
          <span class="input-wrap" id="pwWrap">
            <svg class="lead" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input id="pw" type="password" autocomplete="current-password" placeholder="Enter your password" value="supersecret" />
            <!-- on click: toggle visibility — maps to ui/components/ui/password-field.tsx -->
            <button type="button" class="toggle-eye" aria-label="Show password" onclick="togglePw('pw')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </span>
          <!-- per-field error (hidden by default; shown in error state) -->
          <div id="pwErr" class="err-text" style="display:none;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            Incorrect password.
          </div>
        </label>


        <!-- on submit: POST login { email, password, session_id } → mint code → postMessage to opener -->
        <button id="cta" class="btn btn-primary" type="submit">
          <span class="cta-label">Continue</span>
          <svg class="cta-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </div>

    <!-- trust footer: secured-by + new account link -->
    <div class="secured-pill" style="margin:0 auto;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      Secured by isme SSO
    </div>
    <div class="sso-foot">
      <span>Your password is never shared with medioa2.</span>
    </div>

  </div>
</div>

<!-- DEMO-ONLY state switcher — REMOVE on port -->
<div class="demo-switch" role="group" aria-label="Demo state switcher">
  <span>State</span>
  <button class="active" onclick="showState('default', this)">Default</button>
  <button onclick="showState('error', this)">Error</button>
  <button onclick="showState('loading', this)">Loading</button>
</div>

<script>
  function togglePw(id){ var p = document.getElementById(id); p.type = p.type === 'password' ? 'text' : 'password'; }

  // DEMO-ONLY: visualise the three states the React page will model via form state
  function showState(which, btn){
    var formErr = document.getElementById('formErr');
    var pwWrap = document.getElementById('pwWrap');
    var emailWrap = document.getElementById('emailWrap');
    var pwErr = document.getElementById('pwErr');
    var cta = document.getElementById('cta');
    var label = cta.querySelector('.cta-label');
    var arrow = cta.querySelector('.cta-arrow');
    var inputs = document.querySelectorAll('.input-wrap input, .toggle-eye');

    // reset
    formErr.classList.remove('show');
    pwWrap.classList.remove('error');
    emailWrap.classList.remove('error');
    pwErr.style.display = 'none';
    cta.disabled = false;
    label.textContent = 'Continue';
    arrow.style.display = '';
    var old = cta.querySelector('.spinner'); if (old) old.remove();
    inputs.forEach(function(i){ i.disabled = false; });

    if (which === 'error') {
      formErr.classList.add('show');
      pwWrap.classList.add('error');
      pwErr.style.display = 'flex';
    } else if (which === 'loading') {
      cta.disabled = true;
      label.textContent = 'Signing in…';
      arrow.style.display = 'none';
      var sp = document.createElement('span'); sp.className = 'spinner';
      cta.insertBefore(sp, label);
      inputs.forEach(function(i){ i.disabled = true; });
    }

    document.querySelectorAll('.demo-switch button').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }
</script>

</body>
</html>
